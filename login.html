<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ingresar — #confiaenfede</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/style.css">
<style>
body{background:var(--ink);color:var(--paper);display:flex;align-items:center;justify-content:center;}
.login-wrap{width:100%;max-width:400px;padding:24px;}
.brand{text-align:center;margin-bottom:40px;}
.brand-name{font-family:var(--font-serif);font-size:2rem;color:var(--paper);}
.brand-name span{color:var(--gold);}
.brand-tag{font-size:0.7rem;letter-spacing:2px;text-transform:uppercase;color:#666;margin-top:4px;}
.card{background:#1a1a1a;border:1px solid #2a2a2a;border-radius:16px;padding:32px;}
.card-title{font-family:var(--font-serif);font-size:1.3rem;margin-bottom:6px;color:var(--paper);}
.card-sub{font-size:0.8rem;color:#666;margin-bottom:28px;}
label{color:#888;}
input[type=email],input[type=password]{border-color:#2a2a2a;background:#111;color:var(--paper);}
input::placeholder{color:#444;}
.remember-row{display:flex;align-items:center;gap:8px;margin-bottom:24px;}
.remember-row input[type=checkbox]{width:16px;height:16px;accent-color:var(--gold);}
.remember-row label{font-size:0.8rem;color:#888;margin:0;text-transform:none;letter-spacing:0;font-weight:400;}
.btn-login{width:100%;padding:14px;background:var(--gold);color:var(--ink);border:none;border-radius:10px;font-family:inherit;font-size:0.95rem;font-weight:700;cursor:pointer;transition:all 0.2s;display:flex;align-items:center;justify-content:center;gap:8px;}
.btn-login:hover{background:#b8940a;}
.btn-login:disabled{opacity:0.5;cursor:not-allowed;}
.error-msg{display:none;background:#2a1a1a;border:1px solid #5a2a2a;border-radius:8px;padding:11px 14px;font-size:0.82rem;color:#f87171;margin-bottom:16px;}
.error-msg.show{display:block;}
.btn-spinner{width:16px;height:16px;border:2px solid rgba(0,0,0,0.3);border-top-color:var(--ink);border-radius:50%;animation:spin 0.7s linear infinite;display:inline-block;}
.footer-note{text-align:center;margin-top:20px;font-size:0.72rem;color:#444;}
</style>
</head>
<body>
<div class="login-wrap">
  <div class="brand">
    <div class="brand-name">#confiaenfede<span>.</span></div>
    <div class="brand-tag">Inteligencia en Bienes Raíces</div>
  </div>
  <div class="card">
    <div class="card-title">Bienvenido</div>
    <div class="card-sub">Ingresá con tu cuenta para continuar</div>
    <div class="error-msg" id="errorMsg"></div>
    <div class="form-group">
      <label>Email</label>
      <input type="email" id="email" placeholder="tu@email.com" autocomplete="email">
    </div>
    <div class="form-group">
      <label>Contrasena</label>
      <input type="password" id="password" placeholder="..." autocomplete="current-password">
    </div>
    <div class="remember-row">
      <input type="checkbox" id="remember">
      <label for="remember">Mantenerme conectado</label>
    </div>
    <button class="btn-login" id="btnLogin" onclick="doLogin()">Ingresar</button>
  </div>
  <div class="footer-note">#confiaenfede - Sistema interno</div>
</div>

<script>
document.addEventListener('keydown', function(e) {
  if (e.key === 'Enter') doLogin();
});

async function doLogin() {
  var email = document.getElementById('email').value.trim();
  var password = document.getElementById('password').value;
  var remember = document.getElementById('remember').checked;
  var btn = document.getElementById('btnLogin');
  var errEl = document.getElementById('errorMsg');

  if (!email || !password) {
    showError('Completa email y contrasena');
    return;
  }

  btn.disabled = true;
  btn.textContent = 'Ingresando...';
  errEl.classList.remove('show');

  try {
    var res = await fetch('/api/auth/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email: email, password: password, remember: remember })
    });
    var data = await res.json();

    if (res.ok && data.ok) {
      btn.textContent = 'OK!';
      window.location.href = data.redirect || '/';
    } else {
      showError(data.error || 'Email o contrasena incorrectos');
      btn.disabled = false;
      btn.textContent = 'Ingresar';
    }
  } catch (e) {
    showError('Error de conexion. Intenta de nuevo.');
    btn.disabled = false;
    btn.textContent = 'Ingresar';
  }
}

function showError(msg) {
  var el = document.getElementById('errorMsg');
  el.textContent = msg;
  el.classList.add('show');
}
</script>
</body>
</html>
